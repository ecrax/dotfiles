[module/time]
type = internal/date
interval = 60

format = <label>
format-background = #2a2e36
format-foreground = #82868e

date = ůį•Ē %H:%M%{F-}
time-alt = ůįÉ≠ %a, %b %d%{F-}

label = %date%%time%

[module/mem]
type = custom/script
exec = free -m | sed -n 's/^Mem:\s\+[0-9]\+\s\+\([0-9]\+\)\s.\+/\1/p'
format = <label>
format-prefix = "Ô¨ô " 
label = %output% MB
label-padding = 1
format-prefix-foreground = #d19a66

[module/updates]
type = custom/script
exec = doas xbps-install -S > /dev/null 2>&1; xbps-updates
format = <label>
interval = 4600 
label =ÔĄĻ  %output%  
label-padding = 2
label-foreground = #BF616A

[module/powermenu]
type = custom/text 
content ="ÔÄĎ " 
content-padding = 2
